<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Inter, Segoe UI, sans-serif">
  <defs>
    <style>
      .title { font-size: 22px; font-weight: 700; fill: #0f172a; }
      .sub { font-size: 12px; fill: #64748b; }
      .stage { font-size: 12px; font-weight: 600; fill: #0f172a; }
      .stagen { font-size: 11px; font-weight: 700; fill: #ffffff; }
      .legend { font-size: 11px; fill: #475569; }
      .note { font-size: 11px; fill: #64748b; }
    </style>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="900" height="480" fill="#f8fafc"/>
  <text x="32" y="42" class="title">Governance Workflow Engine</text>
  <text x="32" y="62" class="sub">One reusable state machine. Every stage carries status, reviewer, due date, comments and timestamped history — reused across three modules.</text>

  <!-- Stage nodes -->
  <!-- coordinates -->
  <!-- 7 stages across two rows -->
  <g>
    <!-- Registered -->
    <circle cx="90" cy="150" r="30" fill="#16a34a"/>
    <text x="90" y="154" text-anchor="middle" class="stagen">1</text>
    <text x="90" y="200" text-anchor="middle" class="stage">Registered</text>

    <circle cx="230" cy="150" r="30" fill="#16a34a"/>
    <text x="230" y="154" text-anchor="middle" class="stagen">2</text>
    <text x="230" y="200" text-anchor="middle" class="stage">Risk Review</text>

    <circle cx="370" cy="150" r="30" fill="#16a34a"/>
    <text x="370" y="154" text-anchor="middle" class="stagen">3</text>
    <text x="370" y="200" text-anchor="middle" class="stage">Security Review</text>

    <circle cx="510" cy="150" r="30" fill="#f59e0b"/>
    <text x="510" y="154" text-anchor="middle" class="stagen">4</text>
    <text x="510" y="200" text-anchor="middle" class="stage">Responsible AI</text>
    <text x="510" y="215" text-anchor="middle" class="note">in progress</text>

    <circle cx="650" cy="150" r="30" fill="#dc2626"/>
    <text x="650" y="154" text-anchor="middle" class="stagen">5</text>
    <text x="650" y="200" text-anchor="middle" class="stage">Human Approval</text>
    <text x="650" y="215" text-anchor="middle" class="note">blocked example</text>

    <circle cx="790" cy="150" r="30" fill="#cbd5e1"/>
    <text x="790" y="154" text-anchor="middle" class="stagen" fill="#475569">6</text>
    <text x="790" y="200" text-anchor="middle" class="stage">Deployment</text>

    <circle cx="790" cy="300" r="30" fill="#cbd5e1"/>
    <text x="790" y="304" text-anchor="middle" class="stagen" fill="#475569">7</text>
    <text x="790" y="350" text-anchor="middle" class="stage">In Production</text>
  </g>

  <!-- connectors -->
  <g stroke="#64748b" stroke-width="2" fill="none">
    <path d="M120 150 L200 150" marker-end="url(#a2)"/>
    <path d="M260 150 L340 150" marker-end="url(#a2)"/>
    <path d="M400 150 L480 150" marker-end="url(#a2)"/>
    <path d="M540 150 L620 150" marker-end="url(#a2)"/>
    <path d="M680 150 L760 150" marker-end="url(#a2)"/>
    <path d="M790 180 L790 270" marker-end="url(#a2)"/>
  </g>

  <!-- Monitoring / audit loop -->
  <path d="M790 330 C 790 420, 90 420, 90 190" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#a2)"/>
  <text x="440" y="438" text-anchor="middle" class="note">Production Monitoring → Audit History (every transition is logged; re-review reopens a stage)</text>

  <!-- Legend -->
  <g>
    <rect x="32" y="86" width="836" height="30" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <circle cx="52" cy="101" r="7" fill="#16a34a"/><text x="66" y="105" class="legend">Approved</text>
    <circle cx="150" cy="101" r="7" fill="#f59e0b"/><text x="164" y="105" class="legend">In progress</text>
    <circle cx="262" cy="101" r="7" fill="#dc2626"/><text x="276" y="105" class="legend">Blocked / rejected</text>
    <circle cx="410" cy="101" r="7" fill="#cbd5e1"/><text x="424" y="105" class="legend">Not started</text>
    <text x="560" y="105" class="legend">Reused in: Product Detail · Responsible AI Center · Human Approval Center</text>
  </g>
</svg>
